<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

        <title>Family Login</title>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: "Jura", sans-serif;
                min-height: 100vh;
                background: #f3f3f3;
            }

            .login-page {
                position: relative;
                min-height: 100vh;
                width: 100%;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: flex-end;
                padding: 0 1rem 4vh;
            }

            .bg-kids {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center 35%;
                z-index: 0;
            }

            .login-page::before {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.15);
                z-index: 1;
            }

            .family-access-container {
                position: relative;
                z-index: 2;
                width: 100%;
                max-width: 400px;
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
                background: rgba(255, 255, 255, 0.16);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                border: 1px solid rgba(255, 255, 255, 0.35);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            }

            .family-access-container:hover {
                transform: translateY(-3px);
                transition: 0.3s ease;
            }

            .family-access-container h1 {
                text-align: center;
                color: #0c3d72;
                margin: 0 0 1.5rem;
                font-size: 2rem;
            }

            .family-access-container input {
                width: 100%;
                padding: 12px 14px;
                margin-bottom: 1rem;
                border-radius: 10px;
                border: 1px solid #ccc;
                font-family: "Jura", sans-serif;
                font-size: 1rem;
            }

            .family-access-container button {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 12px;
                background: #20720c;
                color: white;
                font-weight: bold;
                font-family: "Jura", sans-serif;
                font-size: 1rem;
                cursor: pointer;
            }

            .family-access-container button:hover {
                opacity: 0.95;
            }

            @media (max-width: 768px) {
                .login-page {
                    align-items: flex-end;
                    padding: 0 1rem 2vh;
                }

                .bg-kids {
                    object-position: center 30%;
                }

                .family-access-container {
                    max-width: 92%;
                    padding: 2rem 1.25rem;
                    border-radius: 22px;
                }

                .family-access-container h1 {
                    font-size: 1.8rem;
                }
            }

            @media (max-width: 480px) {
                .bg-kids {
                    object-position: center 26%;
                }

                .family-access-container {
                    padding: 1.8rem 0.5rem;
                }

                .family-access-container h1 {
                    font-size: 1.6rem;
                }
            }
        </style>
    </head>

    <body>

        <div class="login-page">
            <img src="images/trillis.jpg" alt="Family background" class="bg-kids">

            <form id="loginForm" class="family-access-container">
                <h1>Family Access</h1>

                <input id="username" type="text" placeholder="Name" required>
                <input id="password" type="password" placeholder="Password" required>

                <button type="submit">Enter</button>

                <p id="errorMsg" class="error"></p>
            </form>
        </div>

        <script src="js/login.js"></script>
    </body>

</html>
